---
kind: ConfigMap
apiVersion: v1
metadata:
  name: ha-config
data:
  http.yaml: |-
    use_x_forwarded_for: true
    trusted_proxies:
      - 127.0.0.1
      - 10.42.0.0/24
      - 10.43.0.0/16

  configuration.yaml: |-
    default_config:

    frontend:
      themes: !include_dir_merge_named themes

    http: !include http.yaml

    scene: !include scenes.yaml

    script: !include scripts.yaml

    automation: !include automations.yaml
