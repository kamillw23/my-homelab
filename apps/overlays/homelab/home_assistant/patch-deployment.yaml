---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
spec:
  template:
    spec:
      initContainers:
        - name: config-init
          image: busybox
          command:
            - sh
            - -c
            - |
              touch /config/automations.yaml
              touch /config/scripts.yaml
              touch /config/scenes.yaml
          volumeMounts:
            - mountPath: /config
              name: data
      containers:
        - name: home-assistant
          image: "ghcr.io/home-assistant/home-assistant:stable"
          securityContext:
            privileged: true
          ports:
            - containerPort: 8123
          volumeMounts:
            - mountPath: /config
              name: data
            - mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              name: ha-config
            - mountPath: /config/http.yaml
              subPath: http.yaml
              name: ha-config
            - mountPath: /etc/localtime
              name: localtime
              readOnly: true
      volumes:
        - name: ha-config
          configMap:
            name: ha-config
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
        - name: data
          persistentVolumeClaim:
            claimName: home-assistant-pvc
