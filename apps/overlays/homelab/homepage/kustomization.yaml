---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage
resources:
  - ../../../base/homepage
patches:
  - target:
      kind: Ingress
      name: homepage
    path: patch-ingress.yaml

  - target:
      kind: Deployment
      name: homepage
    patch: |
      - op: replace
        path: "/spec/template/spec/containers/0/env/0/value"
        value: "homelab"

  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: homepage
      data:
        settings.yaml: |
          title: My custom homelab Homepage
          theme: dark
          headerStyle: clean
