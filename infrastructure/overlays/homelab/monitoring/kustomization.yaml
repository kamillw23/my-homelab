apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - ../../../base/monitoring

patches:
  - target:
      kind: Ingress
      name: grafana
    path: patch-ingress.yaml

  - target:
      kind: HelmRelease
      name: grafana
    path: patch-HelmRelease.yaml
